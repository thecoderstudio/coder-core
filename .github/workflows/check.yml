name: Check, build and upload

on:
  pull_request:
    branches:
    - develop
    - master
  push:
    branches:
    - develop
    - master


jobs:
  check_build_and_upload:
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: actions/setup-python@v4
        with:
          python-version: 'pypy3.9'

      - name: Build wheel
        run: python -m build

      - name: Check build
        run: twine check dist/*

      - name: Upload wheel and tar
        uses: actions/upload-artifact@v3
        with:
          name: Release build
          path: dist/*
          retention-days: 5
