version: '3'
services:
  coder-core-test:
    container_name: coder-core-test
    image: coder-core:test
    build:
      context: .
    volumes:
      - .:/home/codercore/coder-core
      - /home/codercore/coder-core/codercore.egg-info
    networks:
      - test
    env_file:
      - database.env.test
      - cache.env.test
    depends_on:
      - database-test
      - cache-test
    tty: true
    stdin_open: true
  database-test:
    container_name: coder-core-db-test
    image: postgres:15
    networks:
      - test
    env_file:
      - database.env.test
  cache-test:
    container_name: coder-core-cache-test
    image: redis:7
    networks:
      - test
    env_file:
      - cache.env.test
networks:
  test:
